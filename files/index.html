<html>
  <head>
    <meta charset='utf-8'>
    <title>Never3924 | ファイルダウンロード</title>
  </head>
  <body>
    <h1>ファイルダウンロード</h1>
    <div id='buttons'>
    </div>
    <script>
      var btn=document.getElementById('buttons');
      function fileIO(name){
        btn.innerHTML+='<p><a class="buttons" href="./upload/'+name+'" download>'+name+'</a></p>';
      }
      fileIO('text.txt');
      btn=null;
    </script>
    <style>
      .buttons{
        text-decoration:none;
        padding:0px 10px 0px 10px;
        color:#000000;
        border:none;
        border-radius:10px;
        background-color:#f0f0f0;
        transition:all 0.5s 0s ease;
      }
      .buttons:hover{
        color:#aaaaaa;
      }
    </style>
  </body>
</html>
