<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Annotator</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<style>
:root {
  --bg:       #0f1012;
  --surface:  #1a1c20;
  --surface2: #22252b;
  --border:   #2c2f36;
  --accent:   #5b9cf6;
  --accent-d: #1b3260;
  --danger:   #e05c5c;
  --text:     #e4e6eb;
  --muted:    #6b7280;
  --radius:   8px;
  --tab-h:    56px;
  --top-h:    52px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden}
body{font-family:system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--text);display:flex;flex-direction:column;height:100svh}

#topbar{height:var(--top-h);display:flex;align-items:center;gap:8px;padding:0 12px;background:var(--surface);border-bottom:1px solid var(--border);flex-shrink:0;overflow-x:auto;scrollbar-width:none}
#topbar::-webkit-scrollbar{display:none}
#topbar h1{font-size:14px;font-weight:700;color:var(--accent);white-space:nowrap;margin-right:4px;letter-spacing:.05em}
.sep{width:1px;height:20px;background:var(--border);flex-shrink:0;margin:0 2px}
.btn{display:inline-flex;align-items:center;gap:5px;padding:0 14px;height:36px;border-radius:var(--radius);border:1px solid var(--border);background:var(--surface2);color:var(--text);font-size:13px;cursor:pointer;white-space:nowrap;flex-shrink:0;transition:background .12s;font-family:inherit}
.btn:hover{background:var(--border)}
.btn:active{opacity:.75}
.btn.primary{background:var(--accent);border-color:var(--accent);color:#fff}
.btn.primary:hover{background:#4a8ae4}
.btn.danger{border-color:var(--danger);color:var(--danger)}
.btn.danger:hover{background:#2a1515}
.btn:disabled{opacity:.35;cursor:not-allowed;pointer-events:none}
.btn.active-mode{background:var(--accent-d);border-color:var(--accent);color:var(--accent)}

#layout{flex:1;display:flex;overflow:hidden;min-height:0}

/* SIDEBAR */
#sidebar{width:200px;flex-shrink:0;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden}
.panel-hd{font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);padding:10px 12px 6px;flex-shrink:0}
#img-list{flex:1;overflow-y:auto;padding:2px 0}
#img-list::-webkit-scrollbar{width:3px}
#img-list::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
.img-item{display:flex;align-items:center;gap:8px;padding:7px 10px;cursor:pointer;border-left:3px solid transparent;min-width:0;transition:background .1s}
.img-item:hover{background:rgba(255,255,255,.04)}
.img-item.active{border-left-color:var(--accent);background:var(--accent-d)}
.img-item .thumb{width:30px;height:30px;object-fit:cover;border-radius:4px;flex-shrink:0;background:var(--border)}
.img-item .iname{font-size:11px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1}
.img-item .ibadge{font-size:10px;background:var(--accent-d);color:var(--accent);border-radius:10px;padding:1px 6px;flex-shrink:0}
#label-panel{border-top:1px solid var(--border);padding:8px 10px 10px;flex-shrink:0}
#label-list{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:8px;max-height:110px;overflow-y:auto}
.lchip{display:inline-flex;align-items:center;gap:4px;padding:4px 9px;border-radius:99px;font-size:11px;cursor:pointer;border:1.5px solid transparent;user-select:none}
.lchip.sel{outline:2px solid #fff;outline-offset:1px}
.lchip .lx{font-size:10px;opacity:.55}
.lchip .lx:hover{opacity:1}
#label-add{display:flex;gap:5px}
#label-io{display:flex;gap:5px;margin-top:6px}
#label-io .btn{flex:1;padding:0 6px;height:28px;font-size:11px;justify-content:center}
#label-input{flex:1;min-width:0;background:var(--bg);border:1px solid var(--border);border-radius:var(--radius);color:var(--text);font-size:12px;padding:5px 8px;outline:none;font-family:inherit}
#label-input:focus{border-color:var(--accent)}
#label-add .btn{padding:0 10px;height:30px;font-size:16px}

/* CANVAS AREA */
#canvas-area{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}
#canvas-toolbar{height:44px;display:flex;align-items:center;gap:6px;padding:0 10px;background:var(--surface);border-bottom:1px solid var(--border);flex-shrink:0;overflow-x:auto;scrollbar-width:none}
#canvas-toolbar::-webkit-scrollbar{display:none}
#zoom-info{font-size:11px;color:var(--muted);white-space:nowrap;min-width:44px;text-align:center}
#mode-hint{font-size:11px;color:var(--muted);padding:0 4px;white-space:nowrap}
#nav-wrap{display:flex;align-items:center;gap:6px;margin-left:auto;flex-shrink:0}
#nav-info{font-size:12px;color:var(--muted);white-space:nowrap}

/* Canvas viewport: clips the transformed canvas */
#canvas-viewport{flex:1;overflow:hidden;position:relative;background:#080909;}
#canvas-wrap{
  position:absolute;
  top:0;left:0;
  transform-origin:0 0;
  /* pan/zoom は transform で JS から制御 */
}
#main-canvas{display:block;touch-action:none;user-select:none;}
#empty-state{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;color:var(--muted);font-size:13px;pointer-events:none;z-index:1}
#empty-state svg{opacity:.25}

/* ANN PANEL */
#ann-panel{width:180px;flex-shrink:0;background:var(--surface);border-left:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden}
#ann-list{flex:1;overflow-y:auto;padding:2px 0}
#ann-list::-webkit-scrollbar{width:3px}
#ann-list::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
.ann-item{display:flex;align-items:center;gap:6px;padding:7px 10px;cursor:pointer;border-left:3px solid transparent;font-size:11px;transition:background .1s}
.ann-item:hover{background:rgba(255,255,255,.04)}
.ann-item.sel{background:rgba(91,156,246,.12);border-left-color:var(--accent)}
.ann-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.ann-lbl{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.ann-del{color:var(--muted);cursor:pointer;font-size:15px;line-height:1;padding:0 2px}
.ann-del:hover{color:var(--danger)}

/* MOBILE TABS */
#tab-bar{display:none;height:var(--tab-h);background:var(--surface);border-top:1px solid var(--border);flex-shrink:0}
.tab-btn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;font-size:10px;color:var(--muted);cursor:pointer;border:none;background:none;padding:6px 0;transition:color .15s;font-family:inherit}
.tab-btn .ticon{font-size:20px;line-height:1}
.tab-btn.active{color:var(--accent)}

/* MOBILE PANEL */
#mobile-panel{display:none;position:fixed;bottom:var(--tab-h);left:0;right:0;max-height:50svh;background:var(--surface);border-top:1px solid var(--border);z-index:50;flex-direction:column;overflow:hidden}
#mobile-panel.open{display:flex}
#mobile-panel-inner{flex:1;overflow-y:auto;overscroll-behavior:contain}
.m-img-item{display:flex;align-items:center;gap:10px;padding:11px 14px;cursor:pointer;border-left:3px solid transparent;min-width:0;transition:background .1s}
.m-img-item:hover{background:rgba(255,255,255,.04)}
.m-img-item.active{border-left-color:var(--accent);background:var(--accent-d)}
.m-img-item .thumb{width:36px;height:36px;object-fit:cover;border-radius:5px;flex-shrink:0;background:var(--border)}
.m-img-item .iname{font-size:13px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1}
.m-img-item .ibadge{font-size:11px;background:var(--accent-d);color:var(--accent);border-radius:10px;padding:2px 8px;flex-shrink:0}
.m-ann-item{display:flex;align-items:center;gap:8px;padding:11px 14px;cursor:pointer;border-left:3px solid transparent;font-size:13px;transition:background .1s}
.m-ann-item:hover{background:rgba(255,255,255,.04)}
.m-ann-item.sel{background:rgba(91,156,246,.12);border-left-color:var(--accent)}
#mobile-label-panel{border-top:1px solid var(--border);padding:10px 12px 12px;flex-shrink:0}
#mobile-label-list{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:10px;max-height:90px;overflow-y:auto}
.m-lchip{display:inline-flex;align-items:center;gap:5px;padding:6px 12px;border-radius:99px;font-size:13px;cursor:pointer;border:1.5px solid transparent;user-select:none}
.m-lchip.sel{outline:2px solid #fff;outline-offset:1px}
.m-lchip .lx{font-size:11px;opacity:.55}
.m-lchip .lx:hover{opacity:1}
#mobile-label-add{display:flex;gap:6px}
#mobile-label-io{display:flex;gap:6px;margin-top:8px}
#mobile-label-io .btn{flex:1;justify-content:center;height:38px;font-size:12px}
#mobile-label-input{flex:1;min-width:0;background:var(--bg);border:1px solid var(--border);border-radius:var(--radius);color:var(--text);font-size:13px;padding:8px 10px;outline:none;font-family:inherit}
#mobile-label-input:focus{border-color:var(--accent)}
#mobile-label-add .btn{height:40px;padding:0 14px}

/* MODAL */
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.72);z-index:100;align-items:flex-end;justify-content:center}
.modal-bg.open{display:flex}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:16px 16px 0 0;padding:20px 16px calc(20px + env(safe-area-inset-bottom,0px));width:100%;max-width:480px}
.modal h2{font-size:15px;font-weight:600;margin-bottom:14px}
#modal-label-list{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:16px;max-height:200px;overflow-y:auto}
.modal-lchip{padding:10px 16px;border-radius:99px;font-size:13px;cursor:pointer;user-select:none}
.modal-lchip:active{opacity:.75}
.modal-row{display:flex;gap:8px}
.modal-row .btn{flex:1;justify-content:center;height:44px}

/* PAN CURSOR */
body.pan-mode #canvas-viewport { cursor: grab; }
body.pan-mode.panning #canvas-viewport { cursor: grabbing; }

/* TOAST */
#toast{position:fixed;bottom:calc(var(--tab-h) + 16px);left:50%;transform:translateX(-50%) translateY(10px);background:var(--surface2);border:1px solid var(--border);color:var(--text);font-size:13px;padding:9px 20px;border-radius:99px;opacity:0;transition:opacity .2s,transform .2s;pointer-events:none;z-index:200;white-space:nowrap;max-width:90vw;overflow:hidden;text-overflow:ellipsis}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

@media(max-width:680px){
  #sidebar,#ann-panel{display:none}
  #tab-bar{display:flex}
  #toast{bottom:calc(var(--tab-h) + 10px)}
  #mode-hint{display:none}
}
@media(min-width:681px){
  #mobile-panel{display:none!important}
  #tab-bar{display:none!important}
}
</style>
</head>
<body>

<header id="topbar">
  <h1>✦ Annotator</h1>
  <div class="sep"></div>
  <label class="btn">📂 画像を開く<input type="file" id="file-input" accept="image/jpeg,image/png" multiple hidden></label>
  <div class="sep"></div>
  <button class="btn" id="save-btn" disabled>💾 セーブ</button>
  <label class="btn">📦 ロード<input type="file" id="load-zip-input" accept=".zip" hidden></label>
  <div class="sep"></div>
  <button class="btn primary" id="export-btn" disabled>⬇ エクスポート</button>
</header>

<div id="layout">
  <aside id="sidebar">
    <div class="panel-hd">画像</div>
    <div id="img-list"></div>
    <div id="label-panel">
      <div class="panel-hd" style="padding:0 0 6px">ラベル</div>
      <div id="label-list"></div>
      <div id="label-add">
        <input type="text" id="label-input" placeholder="新しいラベル" maxlength="30">
        <button class="btn" id="add-label-btn">＋</button>
      </div>
      <div id="label-io">
        <button class="btn" id="export-labels-btn" title="ラベルをJSONで保存">⬇ JSON</button>
        <label class="btn" title="ラベルJSONを読み込む">⬆ JSON<input type="file" id="import-labels-input" accept=".json" hidden></label>
      </div>
    </div>
  </aside>

  <div id="canvas-area">
    <div id="canvas-toolbar">
      <button class="btn danger" id="del-sel-btn" disabled>✕ 選択削除</button>
      <button class="btn danger" id="clear-btn" disabled>🗑 全削除</button>
      <div class="sep"></div>
      <button class="btn" id="zoom-out-btn" disabled title="縮小 (-)">－</button>
      <span id="zoom-info">100%</span>
      <button class="btn" id="zoom-in-btn"  disabled title="拡大 (+)">＋</button>
      <button class="btn" id="zoom-fit-btn" disabled title="フィット">⊡</button>
      <span id="mode-hint"></span>
      <div id="nav-wrap">
        <button class="btn" id="prev-btn" disabled style="padding:0 12px">‹</button>
        <span id="nav-info">—</span>
        <button class="btn" id="next-btn" disabled style="padding:0 12px">›</button>
      </div>
    </div>
    <div id="canvas-viewport">
      <div id="empty-state">
        <svg width="52" height="52" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2">
          <rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18M9 21V9"/>
        </svg>
        画像を開いてアノテーションを開始
      </div>
      <div id="canvas-wrap">
        <canvas id="main-canvas"></canvas>
      </div>
    </div>
  </div>

  <aside id="ann-panel">
    <div class="panel-hd">アノテーション</div>
    <div id="ann-list"></div>
  </aside>
</div>

<div id="tab-bar">
  <button class="tab-btn active" data-tab="images"><span class="ticon">🖼</span>画像</button>
  <button class="tab-btn" data-tab="annotations"><span class="ticon">📋</span>リスト</button>
  <button class="tab-btn" data-tab="labels"><span class="ticon">🏷</span>ラベル</button>
</div>

<div id="mobile-panel">
  <div id="mobile-panel-inner"></div>
  <div id="mobile-label-panel" style="display:none">
    <div id="mobile-label-list"></div>
    <div id="mobile-label-add">
      <input type="text" id="mobile-label-input" placeholder="新しいラベル" maxlength="30">
      <button class="btn" id="mobile-add-label-btn">＋ 追加</button>
    </div>
    <div id="mobile-label-io">
      <button class="btn" id="mobile-export-labels-btn">⬇ JSONエクスポート</button>
      <label class="btn">⬆ JSONインポート<input type="file" id="mobile-import-labels-input" accept=".json" hidden></label>
    </div>
  </div>
</div>

<div class="modal-bg" id="label-modal">
  <div class="modal">
    <h2>🏷 ラベルを選択</h2>
    <div id="modal-label-list"></div>
    <div class="modal-row">
      <button class="btn" id="modal-none-btn">ラベルなし</button>
      <button class="btn danger" id="modal-cancel-btn">キャンセル</button>
    </div>
  </div>
</div>

<!-- ラベルインポート時：追加 or 置き換えの確認 -->
<div class="modal-bg" id="import-mode-modal">
  <div class="modal">
    <h2>📥 ラベルのインポート</h2>
    <p style="font-size:13px;color:var(--muted);margin-bottom:16px">
      読み込んだラベルをどう反映しますか？既存のアノテーションのラベル参照は、置き換えを選ぶとリセットされる場合があります。
    </p>
    <div class="modal-row" style="flex-direction:column">
      <button class="btn primary" id="import-merge-btn" style="justify-content:center;height:44px;margin-bottom:8px">既存に追加（重複はスキップ）</button>
      <button class="btn danger" id="import-replace-btn" style="justify-content:center;height:44px;margin-bottom:8px">すべて置き換える</button>
      <button class="btn" id="import-cancel-btn" style="justify-content:center;height:44px">キャンセル</button>
    </div>
  </div>
</div>

<!-- 起動時：前回のラベルを復元するか確認 -->
<div class="modal-bg" id="restore-modal">
  <div class="modal">
    <h2>🏷 前回のラベルが見つかりました</h2>
    <p id="restore-label-preview" style="font-size:13px;color:var(--muted);margin-bottom:16px"></p>
    <div class="modal-row">
      <button class="btn primary" id="restore-yes-btn" style="flex:1;justify-content:center;height:44px">使用する</button>
      <button class="btn" id="restore-no-btn" style="flex:1;justify-content:center;height:44px">使わない</button>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
// ─────────────────────────────────────────────
// CONSTANTS
// ─────────────────────────────────────────────
const COLORS=['#5b9cf6','#e05c5c','#56c478','#f0a050','#c46ee0','#50d0d0','#f0e050','#e07890','#78a0e0','#78e0a0'];
const HANDLE_R   = 7;
const HANDLE_HIT = 14;
const ZOOM_MIN   = 0.1;
const ZOOM_MAX   = 20;
const ZOOM_STEP  = 0.15; // wheel step (multiplicative)

// ─────────────────────────────────────────────
// STATE
// ─────────────────────────────────────────────
let images=[],annots={},labels=[],curIdx=-1,selAnn=-1,selectedLabel=null;

// viewport transform  (canvas-wrap position & zoom)
let vpZoom  = 1;   // current zoom (1 = natural pixel size)
let vpX     = 0;   // pan offset in viewport px
let vpY     = 0;
let fitZoom = 1;   // zoom that fits the image

// interaction
let iMode     = 'idle'; // 'idle'|'draw'|'move'|'resize'|'pan'
let startPt   = null;   // image coords at pointer-down
let origRect  = null;
let handleIdx = -1;
let tempRect  = null;
let pendingRect = null;

// pan
let panStart  = null;   // viewport px at pan-start
let vpXStart  = 0;
let vpYStart  = 0;

// touch / pinch
let touches      = [];
let pinchDist0   = 0;
let pinchZoom0   = 1;
let pinchCentre  = null;
let isPinching   = false;

// keyboard
let spaceDown = false;

const canvas   = document.getElementById('main-canvas');
const ctx      = canvas.getContext('2d');
const viewport = document.getElementById('canvas-viewport');
const wrap     = document.getElementById('canvas-wrap');
let imgObj     = null;
let currentTab = 'images';

// ─────────────────────────────────────────────
// UTILS
// ─────────────────────────────────────────────
const $=id=>document.getElementById(id);
function toast(msg,dur=2200){const el=$('toast');el.textContent=msg;el.classList.add('show');clearTimeout(el._t);el._t=setTimeout(()=>el.classList.remove('show'),dur)}
function colorFor(lid){return(lid!=null&&labels[lid])?labels[lid].color:'#888'}
function cropName(n,i){return n.replace(/\.[^.]+$/,'')+'_crop_'+String(i+1).padStart(2,'0')+'.png'}
function downloadBlob(blob,name){const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=name;a.click();setTimeout(()=>URL.revokeObjectURL(a.href),5000)}
function readAsDataURL(f){return new Promise((r,e)=>{const rd=new FileReader();rd.onload=()=>r(rd.result);rd.onerror=e;rd.readAsDataURL(f)})}
function readAsArrayBuffer(f){return new Promise((r,e)=>{const rd=new FileReader();rd.onload=()=>r(rd.result);rd.onerror=e;rd.readAsArrayBuffer(f)})}
function loadImg(src){return new Promise((r,e)=>{const i=new Image();i.onload=()=>r(i);i.onerror=e;i.src=src})}
function isMobile(){return window.innerWidth<=680}
function dist2(a,b){return Math.hypot(a.clientX-b.clientX,a.clientY-b.clientY)}
function mid2(a,b){return{x:(a.clientX+b.clientX)/2,y:(a.clientY+b.clientY)/2}}

// ─────────────────────────────────────────────
// VIEWPORT TRANSFORM
// ─────────────────────────────────────────────
function applyTransform(){
  wrap.style.transform=`translate(${vpX}px,${vpY}px) scale(${vpZoom})`;
  wrap.style.transformOrigin='0 0';
  $('zoom-info').textContent=Math.round(vpZoom/fitZoom*100)+'%';
}

function clampPan(){
  if(!imgObj) return;
  const vw=viewport.clientWidth, vh=viewport.clientHeight;
  const iw=imgObj.naturalWidth*vpZoom, ih=imgObj.naturalHeight*vpZoom;
  // allow some margin (half viewport) so image doesn't disappear
  const mx=vw*0.5, my=vh*0.5;
  vpX=Math.min(mx, Math.max(vpX, vw-iw-mx));
  vpY=Math.min(my, Math.max(vpY, vh-ih-my));
}

/** Zoom centred on viewport point (vx,vy) */
function zoomAt(vx,vy,newZoom){
  newZoom=Math.max(ZOOM_MIN, Math.min(ZOOM_MAX, newZoom));
  const ratio=newZoom/vpZoom;
  vpX=vx-(vx-vpX)*ratio;
  vpY=vy-(vy-vpY)*ratio;
  vpZoom=newZoom;
  clampPan();
  applyTransform();
}

function fitToViewport(){
  if(!imgObj) return;
  const vw=viewport.clientWidth, vh=viewport.clientHeight;
  fitZoom=Math.min(vw/imgObj.naturalWidth, vh/imgObj.naturalHeight, 1);
  vpZoom=fitZoom;
  vpX=(vw-imgObj.naturalWidth*vpZoom)/2;
  vpY=(vh-imgObj.naturalHeight*vpZoom)/2;
  applyTransform();
}

// Convert viewport-relative px → image px
function vpToImg(vx,vy){
  return{x:(vx-vpX)/vpZoom, y:(vy-vpY)/vpZoom};
}

// ─────────────────────────────────────────────
// HANDLE LOGIC  (image coords, drawn at vpZoom scale)
// ─────────────────────────────────────────────
function getHandles(rect){
  const mx=(rect.top_x+rect.bottom_x)/2, my=(rect.top_y+rect.bottom_y)/2;
  return[
    {x:rect.top_x,y:rect.top_y},   {x:mx,y:rect.top_y},    {x:rect.bottom_x,y:rect.top_y},
    {x:rect.top_x,y:my},                                     {x:rect.bottom_x,y:my},
    {x:rect.top_x,y:rect.bottom_y},{x:mx,y:rect.bottom_y},  {x:rect.bottom_x,y:rect.bottom_y},
  ];
}
const HANDLE_CURSORS=['nw-resize','n-resize','ne-resize','w-resize','e-resize','sw-resize','s-resize','se-resize'];

// Hit test in image coords, accounting for zoom
function hitHandle(imgPt, rect){
  const hitR=HANDLE_HIT/vpZoom; // hit radius in image coords
  const handles=getHandles(rect);
  for(let i=0;i<handles.length;i++){
    if(Math.abs(imgPt.x-handles[i].x)<=hitR && Math.abs(imgPt.y-handles[i].y)<=hitR) return i;
  }
  return -1;
}
function hitRect(imgPt, rect){
  return imgPt.x>=rect.top_x && imgPt.x<=rect.bottom_x && imgPt.y>=rect.top_y && imgPt.y<=rect.bottom_y;
}
function clampI(v){return Math.max(0,Math.min(imgObj?imgObj.naturalWidth:1e9,Math.round(v)))}
function clampJ(v){return Math.max(0,Math.min(imgObj?imgObj.naturalHeight:1e9,Math.round(v)))}

function applyResize(rect,hIdx,dxi,dyi){
  let{top_x:tx,top_y:ty,bottom_x:bx,bottom_y:by}=rect;
  if([0,3,5].includes(hIdx)) tx=clampI(tx+dxi);
  if([2,4,7].includes(hIdx)) bx=clampI(bx+dxi);
  if([0,1,2].includes(hIdx)) ty=clampJ(ty+dyi);
  if([5,6,7].includes(hIdx)) by=clampJ(by+dyi);
  if(tx>bx){const t=tx;tx=bx;bx=t;}
  if(ty>by){const t=ty;ty=by;by=t;}
  return{top_x:tx,top_y:ty,bottom_x:bx,bottom_y:by};
}
function applyMove(rect,dxi,dyi){
  const w=rect.bottom_x-rect.top_x,h=rect.bottom_y-rect.top_y;
  const iw=imgObj?imgObj.naturalWidth:1e9, ih=imgObj?imgObj.naturalHeight:1e9;
  let tx=Math.round(rect.top_x+dxi), ty=Math.round(rect.top_y+dyi);
  tx=Math.max(0,Math.min(iw-w,tx)); ty=Math.max(0,Math.min(ih-h,ty));
  return{top_x:tx,top_y:ty,bottom_x:tx+w,bottom_y:ty+h};
}

// ─────────────────────────────────────────────
// RENDER
// ─────────────────────────────────────────────
function redraw(){
  if(!imgObj) return;
  ctx.clearRect(0,0,canvas.width,canvas.height);
  ctx.drawImage(imgObj,0,0);
  const anns=annots[images[curIdx].name]||[];
  anns.forEach((a,i)=>drawRect(a.rect,colorFor(a.label_id),i===selAnn));
  if(tempRect) drawRect(tempRect,'#ffffff',false,true);
}

function drawRect(rect,color,selected,dashed=false){
  const tx=rect.top_x,ty=rect.top_y,bx=rect.bottom_x,by=rect.bottom_y;
  const w=bx-tx,h=by-ty;

  // Scale handle size inversely with zoom so they stay visually constant
  const hr=HANDLE_R/vpZoom;
  const lw=(selected?2.5:1.5)/vpZoom;

  ctx.save();
  ctx.lineWidth=lw;
  if(dashed) ctx.setLineDash([6/vpZoom,3/vpZoom]);
  ctx.strokeStyle=color;
  ctx.strokeRect(tx,ty,w,h);
  ctx.fillStyle=color+(selected?'28':'18');
  ctx.fillRect(tx,ty,w,h);

  if(selected){
    getHandles(rect).forEach(h=>{
      ctx.setLineDash([]);
      ctx.fillStyle='#fff';
      ctx.fillRect(h.x-hr,h.y-hr,hr*2,hr*2);
      ctx.strokeStyle=color;
      ctx.lineWidth=1.5/vpZoom;
      ctx.strokeRect(h.x-hr,h.y-hr,hr*2,hr*2);
    });
  }
  ctx.restore();
}

// ─────────────────────────────────────────────
// GET VIEWPORT-RELATIVE POSITION
// ─────────────────────────────────────────────
function getVpPos(e){
  // viewport 基準の座標（パン計算用）
  const r=viewport.getBoundingClientRect();
  const src=e.touches?e.touches[0]:e;
  return{x:src.clientX-r.left, y:src.clientY-r.top};
}

// クライアント座標 → 画像座標
// canvas.getBoundingClientRect() を使うことで
// CSS transform 後の実際の描画位置を正確に反映する
function clientToImg(clientX, clientY){
  const r=canvas.getBoundingClientRect();
  // canvas は naturalWidth×naturalHeight で描画し、
  // CSS transform で vpZoom 倍されているので
  // getBoundingClientRect().width = naturalWidth * vpZoom
  const scaleX=canvas.width /r.width;
  const scaleY=canvas.height/r.height;
  return{
    x:(clientX-r.left)*scaleX,
    y:(clientY-r.top )*scaleY,
  };
}

// ─────────────────────────────────────────────
// CURSOR
// ─────────────────────────────────────────────
function updateCursor(ip){
  if(!imgObj||curIdx<0){canvas.style.cursor='default';return}
  if(spaceDown){$('mode-hint').textContent='スペース: パン';return}
  if(selAnn>=0){
    const rect=(annots[images[curIdx].name]||[])[selAnn];
    if(rect){
      const hi=hitHandle(ip,rect);
      if(hi>=0){canvas.style.cursor=HANDLE_CURSORS[hi];$('mode-hint').textContent='ハンドル: リサイズ';return}
      if(hitRect(ip,rect)){canvas.style.cursor='move';$('mode-hint').textContent='内側: 移動';return}
    }
  }
  canvas.style.cursor='crosshair';
  $('mode-hint').textContent='ドラッグ: 描画';
}

// ─────────────────────────────────────────────
// POINTER EVENTS (mouse)
// ─────────────────────────────────────────────
viewport.addEventListener('mousedown', onMouseDown);
viewport.addEventListener('mousemove', onMouseMove);
viewport.addEventListener('mouseup',   onMouseUp);
viewport.addEventListener('wheel',     onWheel, {passive:false});

function onMouseDown(e){
  if(e.button!==0) return;
  e.preventDefault();
  if(!imgObj) return;

  const ip=clientToImg(e.clientX,e.clientY);

  // Pan mode (space)
  if(spaceDown){
    iMode='pan';
    panStart={x:e.clientX,y:e.clientY};
    vpXStart=vpX; vpYStart=vpY;
    document.body.classList.add('panning');
    return;
  }

  const anns=annots[images[curIdx].name]||[];

  // Handle hit on selected rect
  if(selAnn>=0 && selAnn<anns.length){
    const hi=hitHandle(ip, anns[selAnn].rect);
    if(hi>=0){iMode='resize';handleIdx=hi;startPt=ip;origRect={...anns[selAnn].rect};return}
    if(hitRect(ip, anns[selAnn].rect)){iMode='move';startPt=ip;origRect={...anns[selAnn].rect};return}
  }

  // Click other rect
  for(let i=anns.length-1;i>=0;i--){
    if(hitRect(ip,anns[i].rect)){selAnn=i;$('del-sel-btn').disabled=false;redraw();renderAnnList();updateCursor(ip);return}
  }

  // Draw
  selAnn=-1;$('del-sel-btn').disabled=true;
  iMode='draw'; startPt=ip; tempRect=null;
}

function onMouseMove(e){
  const ip=clientToImg(e.clientX,e.clientY);

  if(iMode==='idle'){ updateCursor(ip); return; }
  e.preventDefault();

  if(iMode==='pan'){
    vpX=vpXStart+(e.clientX-panStart.x);
    vpY=vpYStart+(e.clientY-panStart.y);
    clampPan(); applyTransform(); return;
  }

  const anns=annots[images[curIdx].name]||[];

  if(iMode==='draw'){
    tempRect={
      top_x:   clampI(Math.min(startPt.x,ip.x)),
      top_y:   clampJ(Math.min(startPt.y,ip.y)),
      bottom_x:clampI(Math.max(startPt.x,ip.x)),
      bottom_y:clampJ(Math.max(startPt.y,ip.y)),
    };
    redraw(); return;
  }
  if(iMode==='resize' && selAnn>=0){
    anns[selAnn].rect=applyResize(origRect,handleIdx,ip.x-startPt.x,ip.y-startPt.y);
    redraw(); return;
  }
  if(iMode==='move' && selAnn>=0){
    anns[selAnn].rect=applyMove(origRect,ip.x-startPt.x,ip.y-startPt.y);
    redraw(); return;
  }
}

function onMouseUp(e){
  document.body.classList.remove('panning');
  const prev=iMode; iMode='idle';
  if(prev==='pan') return;

  if(prev==='draw'){
    if(!tempRect||tempRect.bottom_x-tempRect.top_x<3||tempRect.bottom_y-tempRect.top_y<3){tempRect=null;redraw();return}
    pendingRect=tempRect; tempRect=null;
    if(labels.length>0) openLabelModal(); else commitRect(null);
    return;
  }
  if(prev==='resize'||prev==='move'){
    const name=images[curIdx].name;
    (annots[name]||[]).forEach((a,j)=>a.image=cropName(name,j));
    renderAnnList(); return;
  }
}

function onWheel(e){
  e.preventDefault();
  const vp=getVpPos(e);
  const delta=e.deltaY<0 ? (1+ZOOM_STEP) : 1/(1+ZOOM_STEP);
  zoomAt(vp.x, vp.y, vpZoom*delta);
}

// ─────────────────────────────────────────────
// TOUCH EVENTS
// ─────────────────────────────────────────────
viewport.addEventListener('touchstart', onTouchStart, {passive:false});
viewport.addEventListener('touchmove',  onTouchMove,  {passive:false});
viewport.addEventListener('touchend',   onTouchEnd,   {passive:false});
viewport.addEventListener('touchcancel',onTouchEnd,   {passive:false});

function onTouchStart(e){
  e.preventDefault();
  if(!imgObj) return;

  touches=Array.from(e.touches);

  if(touches.length===2){
    // Pinch / 2-finger pan
    isPinching=true; iMode='pan';
    pinchDist0=dist2(touches[0],touches[1]);
    pinchZoom0=vpZoom;
    pinchCentre=mid2(touches[0],touches[1]);
    const r=viewport.getBoundingClientRect();
    panStart={x:pinchCentre.x-r.left, y:pinchCentre.y-r.top};
    vpXStart=vpX; vpYStart=vpY;
    return;
  }

  isPinching=false;

  // Single touch → same as mousedown logic
  const ip=clientToImg(touches[0].clientX,touches[0].clientY);
  const anns=annots[images[curIdx].name]||[];

  if(selAnn>=0 && selAnn<anns.length){
    const hi=hitHandle(ip,anns[selAnn].rect);
    if(hi>=0){iMode='resize';handleIdx=hi;startPt=ip;origRect={...anns[selAnn].rect};return}
    if(hitRect(ip,anns[selAnn].rect)){iMode='move';startPt=ip;origRect={...anns[selAnn].rect};return}
  }
  for(let i=anns.length-1;i>=0;i--){
    if(hitRect(ip,anns[i].rect)){selAnn=i;$('del-sel-btn').disabled=false;redraw();renderAnnList();return}
  }
  selAnn=-1;$('del-sel-btn').disabled=true;
  iMode='draw'; startPt=ip; tempRect=null;
}

function onTouchMove(e){
  e.preventDefault();
  if(!imgObj) return;
  touches=Array.from(e.touches);

  if(touches.length===2){
    isPinching=true;
    const newDist=dist2(touches[0],touches[1]);
    const newMid=mid2(touches[0],touches[1]);
    const r=viewport.getBoundingClientRect();
    const cx=newMid.x-r.left, cy=newMid.y-r.top;

    // zoom centred on pinch midpoint
    const newZoom=Math.max(ZOOM_MIN,Math.min(ZOOM_MAX,pinchZoom0*(newDist/pinchDist0)));
    const ratio=newZoom/vpZoom;
    vpX=cx-(cx-vpX)*ratio;
    vpY=cy-(cy-vpY)*ratio;
    vpZoom=newZoom;

    // 2-finger pan delta
    vpX+=(cx-(panStart.x));
    vpY+=(cy-(panStart.y));
    panStart={x:cx,y:cy};

    clampPan(); applyTransform(); return;
  }

  if(isPinching) return; // finger lifted to 1 but was pinching

  const ip=clientToImg(touches[0].clientX,touches[0].clientY);
  const anns=annots[images[curIdx].name]||[];

  if(iMode==='draw'){
    tempRect={
      top_x:   clampI(Math.min(startPt.x,ip.x)),
      top_y:   clampJ(Math.min(startPt.y,ip.y)),
      bottom_x:clampI(Math.max(startPt.x,ip.x)),
      bottom_y:clampJ(Math.max(startPt.y,ip.y)),
    };
    redraw(); return;
  }
  if(iMode==='resize' && selAnn>=0){
    anns[selAnn].rect=applyResize(origRect,handleIdx,ip.x-startPt.x,ip.y-startPt.y);
    redraw(); return;
  }
  if(iMode==='move' && selAnn>=0){
    anns[selAnn].rect=applyMove(origRect,ip.x-startPt.x,ip.y-startPt.y);
    redraw(); return;
  }
}

function onTouchEnd(e){
  touches=Array.from(e.touches);
  if(touches.length<2) isPinching=false;
  if(touches.length>0) return; // still fingers down

  const prev=iMode; iMode='idle';
  if(isPinching){isPinching=false;return}

  if(prev==='draw'){
    if(!tempRect||tempRect.bottom_x-tempRect.top_x<3||tempRect.bottom_y-tempRect.top_y<3){tempRect=null;redraw();return}
    pendingRect=tempRect; tempRect=null;
    if(labels.length>0) openLabelModal(); else commitRect(null);
    return;
  }
  if(prev==='resize'||prev==='move'){
    const name=images[curIdx].name;
    (annots[name]||[]).forEach((a,j)=>a.image=cropName(name,j));
    renderAnnList(); return;
  }
}

// ─────────────────────────────────────────────
// KEYBOARD
// ─────────────────────────────────────────────
document.addEventListener('keydown',e=>{
  if(e.target.tagName==='INPUT') return;
  if(e.key===' '&&!spaceDown){
    spaceDown=true;
    document.body.classList.add('pan-mode');
    $('mode-hint').textContent='スペース: パン';
    e.preventDefault(); return;
  }
  if(e.key==='ArrowLeft')  selectImage(curIdx-1);
  if(e.key==='ArrowRight') selectImage(curIdx+1);
  if((e.key==='Delete'||e.key==='Backspace')&&selAnn>=0) deleteAnn(selAnn);
  if(e.key==='Escape'){selAnn=-1;iMode='idle';redraw();renderAnnList();$('mode-hint').textContent=''}
  if(e.key==='+'||e.key==='='){const vw=viewport.clientWidth/2,vh=viewport.clientHeight/2;zoomAt(vw,vh,vpZoom*(1+ZOOM_STEP))}
  if(e.key==='-'){const vw=viewport.clientWidth/2,vh=viewport.clientHeight/2;zoomAt(vw,vh,vpZoom/(1+ZOOM_STEP))}
  if(e.key==='0') fitToViewport();
});
document.addEventListener('keyup',e=>{
  if(e.key===' '){
    spaceDown=false;
    document.body.classList.remove('pan-mode');
    iMode='idle';
    $('mode-hint').textContent='';
  }
});

// ─────────────────────────────────────────────
// ZOOM BUTTONS

$('zoom-in-btn').addEventListener('click',()=>{

});
$('zoom-out-btn').addEventListener('click',()=>{
  const vw=viewport.clientWidth/2,vh=viewport.clientHeight/2;

});
$('zoom-fit-btn').addEventListener('click',()=>fitToViewport());

// ─────────────────────────────────────────────
// COMMIT RECT
// ─────────────────────────────────────────────
function commitRect(lid){
  if(!pendingRect) return;
  const name=images[curIdx].name;
  if(!annots[name]) annots[name]=[];
  const idx=annots[name].length;
  annots[name].push({rect:{...pendingRect},image:cropName(name,idx),label_id:lid});
  pendingRect=null; selAnn=annots[name].length-1;
  redraw(); renderAnnList(); renderImgListAll();
  $('del-sel-btn').disabled=false;
  $('save-btn').disabled=false; $('export-btn').disabled=false;
}

// LABELS

function renderLabels(){renderPcLabels();renderMobileLabels();renderModalLabels();saveLabelsToStorage();}
function renderPcLabels(){
  const el=$('label-list');el.innerHTML='';
  labels.forEach((lbl,i)=>{
    const c=document.createElement('div');
    c.className='lchip'+(selectedLabel===i?' sel':'');
    c.style.background=lbl.color+'30';c.style.color=lbl.color;
    c.style.borderColor=selectedLabel===i?lbl.color:'transparent';
    c.innerHTML=`<span>${lbl.name}</span><span class="lx">✕</span>`;
    c.addEventListener('click',e=>{if(e.target.classList.contains('lx')){deleteLabel(i);return}selectedLabel=(selectedLabel===i)?null:i;renderLabels()});
    el.appendChild(c);
  });
}
function renderMobileLabels(){
  const el=$('mobile-label-list');el.innerHTML='';
  labels.forEach((lbl,i)=>{
    const c=document.createElement('div');
    c.className='m-lchip'+(selectedLabel===i?' sel':'');
    c.style.background=lbl.color+'30';c.style.color=lbl.color;
    c.style.borderColor=selectedLabel===i?lbl.color:'transparent';
    c.innerHTML=`<span>${lbl.name}</span><span class="lx">✕</span>`;
    c.addEventListener('click',e=>{if(e.target.classList.contains('lx')){deleteLabel(i);return}selectedLabel=(selectedLabel===i)?null:i;renderLabels()});
    el.appendChild(c);
  });
}
function renderModalLabels(){
  const el=$('modal-label-list');el.innerHTML='';
  labels.forEach((lbl,i)=>{
    const c=document.createElement('div');
    c.className='modal-lchip';
    c.style.background=lbl.color+'30';c.style.color=lbl.color;
    c.textContent=lbl.name;
    c.addEventListener('click',()=>{$('label-modal').classList.remove('open');commitRect(i)});
    el.appendChild(c);
  });
}
function addLabel(inputId){
  const inp=$(inputId),name=inp.value.trim();
  if(!name)return;
  if(labels.find(l=>l.name===name)){toast('同名ラベルが既にあります');return}
  labels.push({name,color:COLORS[labels.length%COLORS.length]});
  inp.value='';renderLabels();
}
function deleteLabel(idx){
  labels.splice(idx,1);
  Object.values(annots).forEach(arr=>arr.forEach(a=>{
    if(a.label_id===idx)a.label_id=null;else if(a.label_id>idx)a.label_id--;
  }));
  if(selectedLabel===idx)selectedLabel=null;else if(selectedLabel>idx)selectedLabel--;
  renderLabels();redraw();renderAnnList();
}
$('add-label-btn').addEventListener('click',()=>addLabel('label-input'));
$('label-input').addEventListener('keydown',e=>{if(e.key==='Enter')addLabel('label-input')});
$('mobile-add-label-btn').addEventListener('click',()=>addLabel('mobile-label-input'));
$('mobile-label-input').addEventListener('keydown',e=>{if(e.key==='Enter')addLabel('mobile-label-input')});

// ─────────────────────────────────────────────
// LABEL JSON EXPORT / IMPORT
// ─────────────────────────────────────────────
const LABEL_STORAGE_KEY = 'annotator_labels_v1';

function buildLabelJSON(){
  // ラベル単体の共有用フォーマット
  return { labels: labels.map(l => l.name) };
}

function exportLabelsJSON(){
  if(!labels.length){ toast('ラベルがありません'); return; }
  const blob = new Blob([JSON.stringify(buildLabelJSON(), null, 2)], {type:'application/json'});
  downloadBlob(blob, 'labels.json');
  toast('ラベルをエクスポートしました');
}
$('export-labels-btn').addEventListener('click', exportLabelsJSON);
$('mobile-export-labels-btn').addEventListener('click', exportLabelsJSON);

// インポート: ファイル読み込み → 名前リストを抽出 → モード選択モーダルを開く
let pendingImportNames = null;

function extractLabelNames(json){
  // { labels: [...] } 形式、もしくは生の配列 [...] のどちらも許容
  if(Array.isArray(json)) return json.filter(n=>typeof n==='string');
  if(json && Array.isArray(json.labels)) return json.labels.filter(n=>typeof n==='string');
  return null;
}

async function handleLabelImportFile(file){
  try{
    const text=await file.text();
    const json=JSON.parse(text);
    const names=extractLabelNames(json);
    if(!names || !names.length){ toast('有効なラベルJSONではありません'); return; }
    pendingImportNames=names;
    $('import-mode-modal').classList.add('open');
  }catch(err){
    console.error(err);
    toast('JSONの読み込みに失敗しました');
  }
}
$('import-labels-input').addEventListener('change', e=>{
  const f=e.target.files[0]; e.target.value='';
  if(f) handleLabelImportFile(f);
});
$('mobile-import-labels-input').addEventListener('change', e=>{
  const f=e.target.files[0]; e.target.value='';
  if(f) handleLabelImportFile(f);
});

$('import-merge-btn').addEventListener('click', ()=>{
  if(!pendingImportNames) return;
  let added=0;
  pendingImportNames.forEach(name=>{
    if(!labels.find(l=>l.name===name)){
      labels.push({name, color:COLORS[labels.length%COLORS.length]});
      added++;
    }
  });
  pendingImportNames=null;
  $('import-mode-modal').classList.remove('open');
  renderLabels();
  toast(`${added}件のラベルを追加しました`);
});

$('import-replace-btn').addEventListener('click', ()=>{
  if(!pendingImportNames) return;
  // 既存のラベル参照（label_id）は置き換え後に意味が変わるためクリアする
  const hadAnnotationsWithLabel = Object.values(annots).some(arr=>arr.some(a=>a.label_id!=null));
  labels = pendingImportNames.map((name,i)=>({name, color:COLORS[i%COLORS.length]}));
  if(hadAnnotationsWithLabel){
    Object.values(annots).forEach(arr=>arr.forEach(a=>{ a.label_id=null; }));
  }
  selectedLabel=null;
  pendingImportNames=null;
  $('import-mode-modal').classList.remove('open');
  renderLabels(); redraw(); renderAnnList();
  toast(hadAnnotationsWithLabel
    ? 'ラベルを置き換えました（既存の割り当てはリセットされました）'
    : 'ラベルを置き換えました');
});

$('import-cancel-btn').addEventListener('click', ()=>{
  pendingImportNames=null;
  $('import-mode-modal').classList.remove('open');
});

// ─────────────────────────────────────────────
// LABEL LOCALSTORAGE（次回起動時に復元するか確認）
// ─────────────────────────────────────────────
let suppressLabelStorageWrite = false; // 起動時の確認モーダル表示中は保存をスキップ

function saveLabelsToStorage(){
  if(suppressLabelStorageWrite) return;
  try{
    if(labels.length){
      localStorage.setItem(LABEL_STORAGE_KEY, JSON.stringify(labels.map(l=>l.name)));
    }else{
      localStorage.removeItem(LABEL_STORAGE_KEY);
    }
  }catch(err){ console.warn('LocalStorage保存に失敗:', err); }
}

function checkStoredLabelsOnBoot(){
  let stored=null;
  try{
    const raw=localStorage.getItem(LABEL_STORAGE_KEY);
    if(raw) stored=JSON.parse(raw);
  }catch(err){ console.warn('LocalStorage読み込みに失敗:', err); }

  if(!stored || !Array.isArray(stored) || !stored.length) return;
  if(labels.length) return; // 既にラベルがある場合は聞かない

  suppressLabelStorageWrite = true; // ユーザーが選択するまで保存をブロック

  $('restore-label-preview').textContent = stored.slice(0,8).join('、') + (stored.length>8 ? ' 他' : '');
  $('restore-modal').classList.add('open');

  $('restore-yes-btn').onclick = ()=>{
    labels = stored.map((name,i)=>({name, color:COLORS[i%COLORS.length]}));
    $('restore-modal').classList.remove('open');
    suppressLabelStorageWrite = false;
    renderLabels();
    toast('前回のラベルを復元しました');
  };
  $('restore-no-btn').onclick = ()=>{
    $('restore-modal').classList.remove('open');
    suppressLabelStorageWrite = false;
    // 「使わない」を選んだ場合、既存の保存データはそのまま残しておく
    // （ユーザーが明示的にラベルを編集するまでは消さない）
  };
}

// ─────────────────────────────────────────────
// IMAGE MANAGEMENT
// ─────────────────────────────────────────────
function makeImgItem(img,i,mobile){
  const cnt=(annots[img.name]||[]).length;
  const el=document.createElement('div');
  el.className=(mobile?'m-img-item':'img-item')+(i===curIdx?' active':'');
  el.innerHTML=`<img class="thumb" src="${img.dataURL}"><span class="iname">${img.name}</span>${cnt?`<span class="ibadge">${cnt}</span>`:''}`;
  el.addEventListener('click',()=>{selectImage(i);if(isMobile())closeMobilePanel()});
  return el;
}
function renderImgListAll(){
  const pc=$('img-list');pc.innerHTML='';
  images.forEach((img,i)=>pc.appendChild(makeImgItem(img,i,false)));
  if(isMobile()&&currentTab==='images')refreshMobileInner();
}
async function selectImage(idx){
  if(idx<0||idx>=images.length)return;
  curIdx=idx;selAnn=-1;iMode='idle';
  imgObj=await loadImg(images[idx].dataURL);
  canvas.width=imgObj.naturalWidth;
  canvas.height=imgObj.naturalHeight;
  $('empty-state').style.display='none';
  canvas.style.display='block';
  fitToViewport();
  redraw();
  renderImgListAll();renderAnnList();updateButtons();
  $('mode-hint').textContent='';
  $('zoom-in-btn').disabled=false;
  $('zoom-out-btn').disabled=false;
  $('zoom-fit-btn').disabled=false;
}
function updateButtons(){
  const has=images.length>0;
  $('save-btn').disabled=!has;$('export-btn').disabled=!has;$('clear-btn').disabled=!has;
  $('prev-btn').disabled=curIdx<=0;$('next-btn').disabled=curIdx>=images.length-1;
  $('nav-info').textContent=has?`${curIdx+1} / ${images.length}`:'—';
  $('del-sel-btn').disabled=selAnn<0;
}
$('file-input').addEventListener('change',async e=>{
  const files=Array.from(e.target.files);if(!files.length)return;
  let added=0;
  for(const f of files){
    if(images.find(i=>i.name===f.name))continue;
    images.push({name:f.name,dataURL:await readAsDataURL(f)});
    if(!annots[f.name])annots[f.name]=[];
    added++;
  }
  e.target.value='';renderImgListAll();
  if(curIdx<0)selectImage(0);else updateButtons();
  toast(`${added}枚の画像を読み込みました`);
});

// ─────────────────────────────────────────────
// ANN LIST
// ─────────────────────────────────────────────
function makeAnnItem(a,i,mobile){
  const el=document.createElement('div');
  el.className=(mobile?'m-ann-item':'ann-item')+(i===selAnn?' sel':'');
  const lname=(a.label_id!=null&&labels[a.label_id])?labels[a.label_id].name:'(無)';
  el.innerHTML=`<span class="ann-dot" style="background:${colorFor(a.label_id)}"></span><span class="ann-lbl">${lname}</span><span class="ann-del">✕</span>`;
  el.addEventListener('click',e=>{
    if(e.target.classList.contains('ann-del')){deleteAnn(i);return}
    selAnn=i;$('del-sel-btn').disabled=false;redraw();renderAnnList();
    if(isMobile())closeMobilePanel();
  });
  return el;
}
function renderAnnList(){
  const pc=$('ann-list');pc.innerHTML='';
  if(curIdx>=0){const anns=annots[images[curIdx].name]||[];anns.forEach((a,i)=>pc.appendChild(makeAnnItem(a,i,false)))}
  if(isMobile()&&currentTab==='annotations')refreshMobileInner();
  updateButtons();
}
function deleteAnn(i){
  const name=images[curIdx].name;
  annots[name].splice(i,1);
  annots[name].forEach((a,j)=>a.image=cropName(name,j));
  if(selAnn>=annots[name].length)selAnn=annots[name].length-1;
  $('del-sel-btn').disabled=selAnn<0;
  redraw();renderAnnList();renderImgListAll();
}
$('del-sel-btn').addEventListener('click',()=>{if(selAnn>=0)deleteAnn(selAnn)});
$('clear-btn').addEventListener('click',()=>{
  if(curIdx<0)return;
  annots[images[curIdx].name]=[];selAnn=-1;
  redraw();renderAnnList();renderImgListAll();updateButtons();
});

// ─────────────────────────────────────────────
// NAV
// ─────────────────────────────────────────────
$('prev-btn').addEventListener('click',()=>selectImage(curIdx-1));
$('next-btn').addEventListener('click',()=>selectImage(curIdx+1));

// ─────────────────────────────────────────────
// LABEL MODAL
// ─────────────────────────────────────────────
function openLabelModal(){renderModalLabels();$('label-modal').classList.add('open')}
$('modal-none-btn').addEventListener('click',()=>{$('label-modal').classList.remove('open');commitRect(null)});
$('modal-cancel-btn').addEventListener('click',()=>{$('label-modal').classList.remove('open');pendingRect=null;redraw()});

// ─────────────────────────────────────────────
// MOBILE TABS
// ─────────────────────────────────────────────
document.querySelectorAll('.tab-btn').forEach(btn=>{
  btn.addEventListener('click',()=>{
    const tab=btn.dataset.tab;
    if(currentTab===tab&&$('mobile-panel').classList.contains('open')){closeMobilePanel();return}
    currentTab=tab;
    document.querySelectorAll('.tab-btn').forEach(b=>b.classList.toggle('active',b.dataset.tab===tab));
    openMobilePanel(tab);
  });
});
function openMobilePanel(tab){
  $('mobile-label-panel').style.display=tab==='labels'?'block':'none';
  refreshMobileInner();
  $('mobile-panel').classList.add('open');
}
function refreshMobileInner(){
  const inner=$('mobile-panel-inner');inner.innerHTML='';
  if(currentTab==='images'){
    if(!images.length){inner.innerHTML='<p style="padding:16px;font-size:13px;color:var(--muted)">画像が読み込まれていません</p>';return}
    images.forEach((img,i)=>inner.appendChild(makeImgItem(img,i,true)));
  }else if(currentTab==='annotations'){
    if(curIdx<0){inner.innerHTML='<p style="padding:16px;font-size:13px;color:var(--muted)">画像を選択してください</p>';return}
    const anns=annots[images[curIdx].name]||[];
    if(!anns.length){inner.innerHTML='<p style="padding:16px;font-size:13px;color:var(--muted)">アノテーションなし</p>';return}
    anns.forEach((a,i)=>inner.appendChild(makeAnnItem(a,i,true)));
  }
}
function closeMobilePanel(){$('mobile-panel').classList.remove('open')}

// ─────────────────────────────────────────────
// JSON / SAVE / LOAD / EXPORT
// ─────────────────────────────────────────────
function buildJSON(){
  return{
    labels:labels.map(l=>l.name),
    annotations:Object.entries(annots).flatMap(([,anns])=>
      anns.map(a=>({rect:{...a.rect},image:a.image,label_id:a.label_id}))
    ),
  };
}
$('save-btn').addEventListener('click',async()=>{
  toast('セーブ中…');
  const zip=new JSZip(),imgF=zip.folder('images');
  for(const img of images)imgF.file(img.name,img.dataURL.split(',')[1],{base64:true});
  zip.file('session.json',JSON.stringify({labels,annots,curIdx,selectedLabel},null,2));
  downloadBlob(await zip.generateAsync({type:'blob',compression:'DEFLATE'}),'annotator_save.zip');
  toast('セーブ完了！');
});
$('load-zip-input').addEventListener('change',async e=>{
  const file=e.target.files[0];if(!file)return;
  e.target.value='';toast('ロード中…');
  try{
    const zip=await JSZip.loadAsync(await readAsArrayBuffer(file));
    const sFile=zip.file('session.json');
    if(!sFile){toast('session.jsonが見つかりません');return}
    const s=JSON.parse(await sFile.async('string'));
    labels=s.labels||[];annots=s.annots||{};selectedLabel=s.selectedLabel??null;
    images=[];
    const imgF=zip.folder('images');
    if(imgF){
      const list=[];
      imgF.forEach((rel,entry)=>{if(!entry.dir)list.push({rel,entry})});
      for(const{rel,entry}of list){
        const b64=await entry.async('base64');
        const ext=rel.split('.').pop().toLowerCase();
        images.push({name:rel,dataURL:`data:${ext==='png'?'image/png':'image/jpeg'};base64,${b64}`});
      }
    }
    curIdx=Math.min(s.curIdx??0,images.length-1);selAnn=-1;iMode='idle';
    renderLabels();renderImgListAll();
    if(images.length>0)await selectImage(curIdx);
    toast('ロード完了！');
  }catch(err){console.error(err);toast('ロードに失敗: '+err.message)}
});
$('export-btn').addEventListener('click',async()=>{
  toast('エクスポート中…');
  const zip=new JSZip(),crops=zip.folder('crops');
  for(const img of images){
    const io=await loadImg(img.dataURL);
    for(const a of(annots[img.name]||[])){
      const oc=document.createElement('canvas');
      const w=a.rect.bottom_x-a.rect.top_x,h=a.rect.bottom_y-a.rect.top_y;
      oc.width=w;oc.height=h;
      oc.getContext('2d').drawImage(io,a.rect.top_x,a.rect.top_y,w,h,0,0,w,h);
      crops.file(a.image,oc.toDataURL('image/png').split(',')[1],{base64:true});
    }
  }
  zip.file('annotations.json',JSON.stringify(buildJSON(),null,2));
  downloadBlob(await zip.generateAsync({type:'blob',compression:'DEFLATE'}),'annotations_export.zip');
  toast('エクスポート完了！');
});

// ─────────────────────────────────────────────
// RESIZE
// ─────────────────────────────────────────────
window.addEventListener('resize',()=>{if(imgObj)fitToViewport()});

// INIT
updateButtons();
checkStoredLabelsOnBoot(); // 先にチェック（確認モーダルでYesが押されたらlabelsがセットされrenderLabelsが呼ばれる）
renderLabels(); // 初期描画（ラベルが無ければ何も保存されない）

</script>
</body>
</html>
