    <div id='sidebar'><meta charset='utf-8'><link href="https://fonts.googleapis.com/css?family=M+PLUS+Rounded+1c" rel="stylesheet"></link><link rel='stylesheet' href='css/main.css'></link><div id='weather'><div class='header'><span id='pre'>どこか</span>の天気</div><div class='body'><p id='time'></p><p><span id='weaimg'>loading...</span></p><p id='wea'></p><p id='publishingOffice'></p><p id='copyright'></p><a href='weather.html'>詳しく</a><br><a href='./index.html'><-トップに戻る</a></div></div><style>#sidebar{position:fixed}.header{background-color:#ffffaa;border-radius:10px 10px 0px 0px;width:160px;text-align:center;}.body{position:relative;top:-16px;background-color:#eeeeee;border-radius:0px 0px 10px 10px;width:160px;text-align:center;}</style><script>var roman2hiragana = {'a':'あ', 'i':'い', 'u':'う', 'e':'え', 'o':'お','ka':'か', 'ki':'き', 'ku':'く', 'ke':'け', 'ko':'こ','sa':'さ', 'si':'し', 'shi':'し','su':'す', 'se':'せ', 'so':'そ','ta':'た', 'ti':'ち', 'tu':'つ', 'te':'て', 'to':'と', 'chi':'ち', 'tsu':'つ','na':'な', 'ni':'に', 'nu':'ぬ', 'ne':'ね', 'no':'の','ha':'は', 'hi':'ひ', 'hu':'ふ', 'he':'へ', 'ho':'ほ', 'fu':'ふ','ma':'ま', 'mi':'み', 'mu':'む', 'me':'め', 'mo':'も','ya':'や', 'yi':'い', 'yu':'ゆ','yo':'よ','ra':'ら', 'ri':'り', 'ru':'る', 're':'れ', 'ro':'ろ','wa':'わ', 'wu':'う', 'wo':'を','nn':'ん','ga':'が', 'gi':'ぎ', 'gu':'ぐ', 'ge':'げ', 'go':'ご','za':'ざ', 'zi':'じ', 'zu':'ず', 'ze':'ぜ', 'zo':'ぞ', 'ji':'じ','da':'だ', 'di':'ぢ', 'du':'づ', 'de':'で', 'do':'ど','ba':'ば', 'bi':'び', 'bu':'ぶ', 'be':'べ', 'bo':'ぼ','pa':'ぱ', 'pi':'ぴ', 'pu':'ぷ', 'pe':'ぺ', 'po':'ぽ',};function r2h(roman) {var i, iz, match, regex,hiragana='',table=roman2hiragana;regex=new RegExp((function(table){var key,s='^(?:';for(key in table)if(table.hasOwnProperty(key)){s+=key+'|';}return s+'(?:n(?![aiueo]|y[aiueo]|$))|'+'([^aiueon])\\1)';})(table));for(i=0,iz=roman.length;i<iz;++i){if(match=roman.slice(i).match(regex)){if(match[0]==='n'){hiragana+='ん';}else if(/^([^n])\1$/.test(match[0])){hiragana+='っ';--i;}else{hiragana+=table[match[0]];}i+=match[0].length-1;}else{hiragana += roman[i];}}return hiragana;}function getweather(){var henkan=['ほっかいどう','あおもり','いわて','みやぎ','あきた','やまがた','ふくしま','いばらき','とちぎ','ぐんま','さいたま','ちば','とうきょう','かながわ','にいがた','とやま','いしかわ','ふくい','やまなし','ながの','ぎふ','しずおか','あいち','みえ','しが','きょうと','おおさか','ひょうご','なら','わかやま','とっとり','しまね','おかやま','ひろしま','やまぐち','とくしま','かがわ','えひめ','こうち','ふくおか','さが','ながさき','くまもと','おおいた','みやざき','かごしま','おきなわ'];var code=['016010'];for (var i=1;i<47;i++){if(i<10){code[i]='0'+i+'0010';}else{code[i]=i+'0010';}}code[code.length]='471010';fetch('https://ipinfo.io?callback').then(res => res.json()).then((json) => {fetch('https://weather.tsukumijima.net/api/forecast?city='+code[henkan.indexOf(r2h(json.region.toLowerCase()))+1]).then((res)=> {return res.json();}).then((resj)=>{document.getElementById('weaimg').innerHTML='<img src="'+resj.forecasts[0].image.url+'"></img>';document.getElementById('time').innerHTML=resj.forecasts[0].date.split('-')[0]+'年'+resj.forecasts[0].date.split('-')[1]+'月'+resj.forecasts[0].date.split('-')[2]+'日<br>'+resj.publicTimeFormatted.split(' ')[1]+'発表';document.getElementById('pre').innerHTML=resj.location.prefecture;document.getElementById('wea').innerHTML=resj.forecasts[0].telop;document.getElementById('copyright').innerHTML='<a href="'+resj.copyright.image.link+'"><img src="'+resj.copyright.image.url+'" rel="'+resj.copyright.image.title+'" title="'+resj.copyright.image.title+'" style="width:50px;height:50px;"></img></a>';document.getElementById('publishingOffice').innerHTML=resj.publishingOffice+'より';})})}window.onload=function(){getwea();getweather();}</script></div></div>

    <script>
      var roman2hiragana={a:"あ",i:"い",u:"う",e:"え",o:"お",ka:"か",ki:"き",ku:"く",ke:"け",ko:"こ",sa:"さ",si:"し",shi:"し",su:"す",se:"せ",so:"そ",ta:"た",ti:"ち",tu:"つ",te:"て",to:"と",chi:"ち",tsu:"つ",na:"な",ni:"に",nu:"ぬ",ne:"ね",no:"の",ha:"は",hi:"ひ",hu:"ふ",he:"へ",ho:"ほ",fu:"ふ",ma:"ま",mi:"み",mu:"む",me:"め",mo:"も",ya:"や",yi:"い",yu:"ゆ",yo:"よ",ra:"ら",ri:"り",ru:"る",re:"れ",ro:"ろ",wa:"わ",wu:"う",wo:"を",nn:"ん",ga:"が",gi:"ぎ",gu:"ぐ",ge:"げ",go:"ご",za:"ざ",zi:"じ",zu:"ず",ze:"ぜ",zo:"ぞ",ji:"じ",da:"だ",di:"ぢ",du:"づ",de:"で",do:"ど",ba:"ば",bi:"び",bu:"ぶ",be:"べ",bo:"ぼ",pa:"ぱ",pi:"ぴ",pu:"ぷ",pe:"ぺ",po:"ぽ"};function r2h(e){var t,i,n,a,r="",o=roman2hiragana;for(t=0,a=RegExp(function(e){var t,i="^(?:";for(t in e)e.hasOwnProperty(t)&&(i+=t+"|");return i+"(?:n(?![aiueo]|y[aiueo]|$))|([^aiueon])\\1)"}(o)),i=e.length;t<i;++t)(n=e.slice(t).match(a))?("n"===n[0]?r+="ん":/^([^n])\1$/.test(n[0])?(r+="っ",--t):r+=o[n[0]],t+=n[0].length-1):r+=e[t];return r}function getwea(){for(var e=["ほっかいどう","あおもり","いわて","みやぎ","あきた","やまがた","ふくしま","いばらき","とちぎ","ぐんま","さいたま","ちば","とうきょう","かながわ","にいがた","とやま","いしかわ","ふくい","やまなし","ながの","ぎふ","しずおか","あいち","みえ","しが","きょうと","おおさか","ひょうご","なら","わかやま","とっとり","しまね","おかやま","ひろしま","やまぐち","とくしま","かがわ","えひめ","こうち","ふくおか","さが","ながさき","くまもと","おおいた","みやざき","かごしま","おきなわ"],t=["016010"],i=1;i<47;i++)i<10?t[i]="0"+i+"0010":t[i]=i+"0010";t[t.length]="471010",fetch("https://ipinfo.io?callback").then(e=>e.json()).then(i=>{fetch("https://weather.tsukumijima.net/api/forecast?city="+t[e.indexOf(r2h(i.region.toLowerCase()))+1]).then(e=>e.json()).then(e=>{document.getElementById("nowtitle").innerHTML=e.title+"("+e.publicTimeFormatted+"発表)",document.getElementById("nowwea").innerHTML='<span class="middle_title">'+e.forecasts[0].dateLabel+"の天気</span>",document.getElementById("nowwea").innerHTML+='<div id="one" class="wea"><img src="'+e.forecasts[0].image.url+'"></img></div>',document.getElementById("nowfoot").innerHTML=e.publishingOffice,document.getElementById("one").innerHTML+="<br>"+e.forecasts[0].telop+"<br><p>風の強さ<br>"+e.forecasts[0].detail.wind+"</p><p>波の高さ<br>"+e.forecasts[0].detail.wave+"</p>",document.getElementById("one").innerHTML+=e.description.text.split("　")[1],document.getElementById("nextwea").innerHTML+='<span class="middle_title">'+e.forecasts[1].dateLabel+"の天気</span>",document.getElementById("nextwea").innerHTML+='<div id="two" class="wea"><img src="'+e.forecasts[1].image.url+'"></img></div>',document.getElementById("nextwea").innerHTML+='<span class="middle_title">'+e.forecasts[2].dateLabel+"の天気</span>",document.getElementById("nextwea").innerHTML+='<div id="three" class="wea"><img src="'+e.forecasts[2].image.url+'"></img></div>',document.getElementById("two").innerHTML+="<br>"+e.forecasts[1].telop+"<br><p>風の強さ<br>"+e.forecasts[1].detail.wind+"</p><p>波の高さ<br>"+e.forecasts[1].detail.wave+"</p>",document.getElementById("two").innerHTML+=e.description.text.split("　")[2],document.getElementById("three").innerHTML+="<br>"+e.forecasts[2].telop+"<br><p>風の強さ<br>"+e.forecasts[2].detail.wind+"</p><p>波の高さ<br>"+e.forecasts[2].detail.wave+"</p>",document.getElementById("three").innerHTML+=e.description.text.split("　")[3],document.getElementById("APIlinkandicon").innerHTML+='<a rel="'+e.copyright.image.title+'" title="'+e.copyright.image.title+'" href="'+e.copyright.image.link+'">'+e.copyright.image.title+"</a>",document.getElementById("nextwea").innerHTML+='<a href="'+e.link+'" target="_blank">もっと詳しく(気象庁,別タブ)</a>',console.log(e)})})}
